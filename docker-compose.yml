version: '3.8'

services:
  db:
    image: mariadb:10
    container_name: antigravity-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_USER: antigravity_user
      MARIADB_PASSWORD: securepassword
      TZ: Asia/Bangkok
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data:
