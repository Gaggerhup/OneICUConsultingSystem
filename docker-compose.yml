version: '3.8'

services:
  db:
    image: mariadb:latest
    container_name: mariadb-hosxp
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: 1234
      MARIADB_DATABASE: icuconsult
      TZ: Asia/Bangkok
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data:
